services:
  db:
    image: postgres:16-alpine
    container_name: propintel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propintel}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set - see .env.example}"
      POSTGRES_DB: ${POSTGRES_DB:-propintel}
    # Bound to localhost only — host port 5433 (5432 may be used by another local Postgres).
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - propintel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-propintel} -d ${POSTGRES_DB:-propintel}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  propintel_pgdata:
